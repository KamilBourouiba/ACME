name: Benchmark Gate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 06:00 UTC

jobs:
  gate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: acme
          POSTGRES_PASSWORD: acme
          POSTGRES_DB: acme
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Scenario count + gate
        env:
          DATABASE_URL: postgresql+asyncpg://acme:acme@localhost:5432/acme
          BENCHMARK_MIN_OVERALL: "0.85"
          BENCHMARK_MIN_BELIEF_QUALITY: "0.55"
        run: |
          PYTHONPATH=. python -c "from acme.evaluation.memorybench import DEFAULT_SCENARIOS; assert len(DEFAULT_SCENARIOS)>=13"
          PYTHONPATH=. pytest tests/test_benchmark_gate.py tests/test_memorybench.py tests/test_baseline_rag.py -q
          PYTHONPATH=. python scripts/run_ablation_gate.py
