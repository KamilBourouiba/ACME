<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#07080d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>ACME Memory Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/chat/assets/style.css" />
</head>
<body>
  <div class="app">
    <header class="mobile-bar">
      <button type="button" id="btn-menu" class="icon-btn" aria-label="Agent panel">☰</button>
      <div class="mobile-title">
        <strong>ACME</strong>
        <span>Memory Chat</span>
      </div>
      <button type="button" id="btn-memory" class="icon-btn" aria-label="Memory stats">◎</button>
    </header>

    <div id="sidebar-backdrop" class="sidebar-backdrop" hidden></div>

    <aside id="sidebar" class="sidebar">
      <header class="brand">
        <h1>ACME</h1>
        <p>Memory you can audit</p>
      </header>
      <section class="session-box">
        <label>Your agent ID</label>
        <code id="session-id">—</code>
        <div class="session-actions">
          <button type="button" id="btn-copy" class="ghost">Copy</button>
          <button type="button" id="btn-new" class="primary">New agent</button>
        </div>
      </section>
      <section class="skills">
        <h2>Skills</h2>
        <ul id="skill-list"></ul>
      </section>
      <section class="memory-panel" id="memory-panel">
        <h2>Memory</h2>
        <div class="stat-grid" id="memory-stats">
          <div><span>Episodes</span><strong id="stat-episodes">0</strong></div>
          <div><span>Beliefs</span><strong id="stat-beliefs">0</strong></div>
          <div><span>Graph</span><strong id="stat-graph">0</strong></div>
          <div><span>Promoted</span><strong id="stat-promoted">0</strong></div>
        </div>
        <ul id="belief-list" class="belief-list"></ul>
      </section>
      <button type="button" id="btn-close-sidebar" class="ghost sidebar-close">Close</button>
    </aside>

    <main class="chat">
      <div id="messages" class="messages" role="log" aria-live="polite"></div>
      <form id="composer" class="composer">
        <div class="composer-row">
          <label class="attach-btn" title="Attach file">
            <input type="file" id="file-input" multiple hidden />
            <span aria-hidden="true">📎</span>
          </label>
          <textarea id="input" rows="1" placeholder="Message your agent…" enterkeyhint="send"></textarea>
          <button type="submit" id="btn-send" class="primary send-btn" aria-label="Send">↑</button>
        </div>
        <div id="file-chips" class="file-chips"></div>
      </form>
    </main>
  </div>
  <script src="/chat/assets/app.js"></script>
</body>
</html>
