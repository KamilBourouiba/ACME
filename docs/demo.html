<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACME Live Demo — Nexus Advisory Squad</title>
  <meta name="description" content="Ten agents build a consulting firm website in Slack-style rooms. Inspect ACME beliefs and deploy to GitHub.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/demo.css">
</head>
<body class="slack-demo">
  <div class="workspace">
    <aside class="sidebar">
      <div class="workspace-header">
        <strong>Nexus Advisory</strong>
        <span class="live-pill" id="live-pill">Connecting</span>
      </div>
      <nav class="channels" id="channel-list" aria-label="Channels"></nav>
      <div class="sidebar-footer">
        <span id="model-label">—</span> · turn <span id="tick-label">0</span>
      </div>
    </aside>

    <section class="main">
      <header class="channel-header">
        <div>
          <h1 id="channel-title">#general</h1>
          <p id="channel-topic">Nexus Advisory website squad</p>
        </div>
        <div class="header-actions">
          <button type="button" class="btn btn-deploy" id="deploy-btn" title="Push site files to GitHub">Deploy to GitHub</button>
          <button type="button" class="btn btn-ghost" id="reset-btn">Reset</button>
        </div>
      </header>

      <div id="demo-error" class="demo-error" hidden></div>
      <div id="deploy-banner" class="deploy-banner" hidden></div>

      <div class="messages" id="messages">
        <div class="empty-state">Waiting for the squad to come online…</div>
      </div>
    </section>

    <aside class="members-panel">
      <h2>Team · ACME memory</h2>
      <div id="member-list"></div>
      <div class="beliefs-panel" id="beliefs-panel">
        <h3 id="belief-title">Select a teammate</h3>
        <p id="belief-subtitle">Each role keeps an isolated belief graph.</p>
        <div id="belief-list" class="belief-list"></div>
      </div>
      <div class="artifacts-panel">
        <h3>Site files</h3>
        <ul id="artifact-list"></ul>
      </div>
    </aside>
  </div>

  <dialog id="deploy-dialog" class="deploy-dialog">
    <form method="dialog" id="deploy-form">
      <h2>Deploy to GitHub</h2>
      <p>Pushes <code>index.html</code>, <code>styles.css</code>, and <code>app.js</code> from the demo.</p>
      <label>Repository <input name="repo" id="deploy-repo" placeholder="KamilBourouiba/consulting-site-demo"></label>
      <label>Branch <input name="branch" id="deploy-branch" value="main"></label>
      <label>GitHub token <input name="token" id="deploy-token" type="password" placeholder="Optional if server configured"></label>
      <div class="dialog-actions">
        <button type="button" class="btn btn-ghost" id="deploy-cancel">Cancel</button>
        <button type="submit" class="btn btn-deploy">Deploy</button>
      </div>
    </form>
  </dialog>

  <script>
    window.ACME_DEMO_API = window.ACME_DEMO_API || "https://acme-api.blackgrass-3076f328.westeurope.azurecontainerapps.io";
  </script>
  <script src="assets/demo.js"></script>
</body>
</html>
